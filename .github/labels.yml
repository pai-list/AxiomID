# AxiomID GitHub Labels
# Sync with: gh label sync .github/labels.yml --delete-other-labels

# ── Type ──────────────────────────────────────────
- name: "feat"
  color: "a2eeef"
  description: "New feature or request"
- name: "fix"
  color: "d73a4a"
  description: "Bug fix"
- name: "docs"
  color: "0075ca"
  description: "Documentation only changes"
- name: "refactor"
  color: "bfd4f2"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "test"
  color: "bfe5bf"
  description: "Adding or updating tests"
- name: "chore"
  color: "e4e669"
  description: "Build process, CI/CD, or auxiliary tool changes"
- name: "perf"
  color: "fbca04"
  description: "Performance improvement (merged: use ONLY this, not 'performance')"
- name: "security"
  color: "d93f0b"
  description: "Security vulnerability fix or hardening"

# ── Area ──────────────────────────────────────────
- name: "area:frontend"
  color: "1d76db"
  description: "UI, components, pages, CSS, i18n"
- name: "area:backend"
  color: "5319e7"
  description: "API routes, serverless functions, Vercel"
- name: "area:auth"
  color: "e11d48"
  description: "Authentication, Pi SDK, OAuth, sessions"
- name: "area:trust-engine"
  color: "6366f1"
  description: "Trust scores, XP, tiers, stamps, VCs"
- name: "area:marketplace"
  color: "22c55e"
  description: "Skills marketplace, publish, install, reviews"
- name: "area:docs"
  color: "0075ca"
  description: "README, CHANGELOG, guides, API docs"
- name: "area:testing"
  color: "bfe5bf"
  description: "Test infrastructure, coverage, CI"
- name: "area:deps"
  color: "ededed"
  description: "Dependency updates, lockfile changes"
- name: "area:i18n"
  color: "c5def5"
  description: "Localization, Arabic/English translations"
- name: "area:security"
  color: "d93f0b"
  description: "Security-related changes (auth, crypto, rate limiting)"

# ── Priority ──────────────────────────────────────
- name: "priority:critical"
  color: "b60205"
  description: "Must be fixed immediately"
- name: "priority:high"
  color: "d93f0b"
  description: "Should be fixed soon"
- name: "priority:medium"
  color: "fbca04"
  description: "Important but not urgent"
- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have"

# ── Status ────────────────────────────────────────
- name: "needs-rebase"
  color: "ffffff"
  description: "Branch has conflicts with main"
- name: "needs-review"
  color: "fbca04"
  description: "Awaiting code review"
- name: "blocked"
  color: "d93f0b"
  description: "Cannot proceed — blocked by dependency or decision"
- name: "breaking-change"
  color: "b60205"
  description: "⚠️ BREAKING — requires migration, version bump, or user action"

# ── Size ──────────────────────────────────────────
- name: "size:xs"
  color: "c2e0c6"
  description: "< 50 lines changed"
- name: "size:s"
  color: "c2e0c6"
  description: "50-200 lines changed"
- name: "size:m"
  color: "fef2c0"
  description: "200-500 lines changed"
- name: "size:l"
  color: "f9d0c4"
  description: "500-1000 lines changed"
- name: "size:xl"
  color: "f9d0c4"
  description: "> 1000 lines changed"
