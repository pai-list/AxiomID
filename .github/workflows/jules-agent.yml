name: Jules AI Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task prompt for Jules'
        required: true
        type: string
      issue_number:
        description: 'Issue number to reference'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  jules-task:
    name: Jules AI Task
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'jules')
    steps:
      - uses: actions/checkout@v7

      - name: Generate prompt from issue
        if: github.event_name == 'issues'
        id: prompt
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq '.body')
          PROMPT="Fix issue #${{ github.event.issue.number }}: ${ISSUE_BODY:0:2000}"
          echo "prompt=$PROMPT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt || github.event.inputs.prompt }}
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

      - name: Link PR to issue
        if: github.event_name == 'issues'
        run: |
          # Jules creates a PR — link it back to the issue
          PR_URL=$(gh pr list --search "issue:${{ github.event.issue.number }}" --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🤖 Jules AI has created a fix: $PR_URL"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
