name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    if: github.event.head_commit.message != 'chore(release):'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version from CHANGELOG
        id: changelog
        run: |
          VERSION=$(grep -m1 -oP '^## \[\K[0-9]+\.[0-9]+\.[0-9]+(?=.*\d{4}-\d{2}-\d{2})' CHANGELOG.md || echo "")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag existence
        id: tag
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "exists=skip" >> "$GITHUB_OUTPUT"
            echo "no version found in CHANGELOG"
            exit 0
          fi
          TAG="v$VERSION"
          if git tag -l "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is new"
          fi

      - name: Extract release body
        id: body
        if: steps.tag.outputs.exists == 'false'
        run: |
          awk '
            /^## \[/ {
              if (version == "") {
                version = $0
                title = $0
                next
              }
            }
            version && /^## \[/ { exit }
            version { print }
          ' CHANGELOG.md > /tmp/release-body.md
          echo "body<<DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/release-body.md >> "$GITHUB_OUTPUT"
          echo "DELIM" >> "$GITHUB_OUTPUT"
          echo "Preview:"
          head -10 /tmp/release-body.md

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "axiomid-release-bot"
          git config user.email "bot@axiomid.app"
          git tag -a "v${{ steps.changelog.outputs.version }}" -m "v${{ steps.changelog.outputs.version }}"
          git push origin "v${{ steps.changelog.outputs.version }}"

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2.1.0
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: false
