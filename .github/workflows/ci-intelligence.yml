name: CI Intelligence Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  index-changes:
    name: Index Code Changes → Vectorize
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "diff=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$DIFF" > /tmp/pr.diff
          FILE_COUNT=$(grep -c "^diff --git" /tmp/pr.diff || echo "0")
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "diff_lines=$(wc -l < /tmp/pr.diff | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract file changes
        if: steps.diff.outputs.file_count != '0'
        run: |
          csplit -z -f /tmp/file_ /tmp/pr.diff '/^diff --git/' '{*}' 2>/dev/null || true

          echo '[]' > /tmp/changes.json
          for f in /tmp/file_*; do
            [ -f "$f" ] || continue
            FILE_PATH=$(head -1 "$f" | sed 's|diff --git a/||; s| b/.*||')
            ADDED=$(grep -c '^+[^+]' "$f" || echo "0")
            REMOVED=$(grep -c '^-[^-]' "$f" || echo "0")
            EXTENSION="${FILE_PATH##*.}"
            python3 -c "
          import json
          with open('/tmp/changes.json') as fh:
              data = json.load(fh)
          data.append({
              'file': '$FILE_PATH',
              'added': int('$ADDED'),
              'removed': int('$REMOVED'),
              'extension': '$EXTENSION'
          })
          with open('/tmp/changes.json', 'w') as fh:
              json.dump(data, fh)
          " 2>/dev/null || true
            rm -f "$f"
          done

          echo "Indexed $(python3 -c "import json; print(len(json.load(open('/tmp/changes.json'))))" 2>/dev/null || echo 0) files"

      - name: Detect anomalies
        if: steps.diff.outputs.file_count != '0'
        run: |
          ALERTS=""
          FILE_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/changes.json'))))" 2>/dev/null || echo 0)
          TOTAL_ADDED=$(python3 -c "import json; print(sum(f['added'] for f in json.load(open('/tmp/changes.json'))))" 2>/dev/null || echo 0)
          TOTAL_REMOVED=$(python3 -c "import json; print(sum(f['removed'] for f in json.load(open('/tmp/changes.json'))))" 2>/dev/null || echo 0)

          if [ "$TOTAL_ADDED" -gt 500 ] || [ "$TOTAL_REMOVED" -gt 500 ]; then
            ALERTS="$ALERTS\n⚠️ **Large PR**: +$TOTAL_ADDED / -$TOTAL_REMOVED lines across $FILE_COUNT files"
          fi

          SEC_FILES=$(python3 -c "
          import json
          data = json.load(open('/tmp/changes.json'))
          sec = [f['file'] for f in data if any(k in f['file'].lower() for k in ['auth', 'middleware', 'crypto', 'secret', 'key', 'token'])]
          print(len(sec))
          " 2>/dev/null || echo 0)
          if [ "$SEC_FILES" -gt 0 ]; then
            ALERTS="$ALERTS\n🔒 **Security-sensitive files changed**: $SEC_FILES files"
          fi

          if [ "$FILE_COUNT" -gt 20 ]; then
            ALERTS="$ALERTS\n📦 **Large scope**: $FILE_COUNT files changed"
          fi

          if [ -n "$ALERTS" ]; then
            echo "### 🔍 CI Intelligence Report" >> $GITHUB_STEP_SUMMARY
            echo -e "$ALERTS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**PR**: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Files**: $FILE_COUNT | **Added**: +$TOTAL_ADDED | **Removed**: -$TOTAL_REMOVED" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ CI Intelligence: No anomalies detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Index to Vectorize
        if: steps.diff.outputs.file_count != '0'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          CF_ACCOUNT_ID = os.environ.get("CF_ACCOUNT_ID", "")
          CF_API_TOKEN = os.environ.get("CF_API_TOKEN", "")
          VECTORIZE_INDEX = os.environ.get("VECTORIZE_INDEX", "ci-code-vectors")

          if not CF_ACCOUNT_ID or not CF_API_TOKEN:
              print("⚠️  Skipping Vectorize: CF_ACCOUNT_ID/CF_API_TOKEN not set")
              print("   See .github/CI_INTELLIGENCE_SETUP.md for setup instructions")
              sys.exit(0)

          with open("/tmp/changes.json") as f:
              changes = json.load(f)

          indexed = 0
          failed = 0
          for change in changes:
              text = f"File: {change['file']}\nExtension: {change['extension']}\nAdded: {change['added']} lines\nRemoved: {change['removed']} lines"

              try:
                  url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/ai/run/@cf/baai/bge-base-en-v1.5"
                  payload = json.dumps({"text": text}).encode()
                  req = urllib.request.Request(url, data=payload, headers={
                      "Authorization": f"Bearer {CF_API_TOKEN}",
                      "Content-Type": "application/json"
                  })
                  resp = urllib.request.urlopen(req, timeout=15)
                  embedding = json.loads(resp.read())["result"]["data"][0]

                  vec_url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/vectorize/indexes/{VECTORIZE_INDEX}/insert"
                  vec_payload = json.dumps({
                      "vectors": [{
                          "id": f"pr-{os.environ.get('PR_NUMBER', '0')}-{change['file'].replace('/', '-')}",
                          "values": embedding,
                          "metadata": {
                              "file": change["file"],
                              "extension": change["extension"],
                              "added": change["added"],
                              "removed": change["removed"],
                              "pr_number": int(os.environ.get("PR_NUMBER", "0")),
                              "timestamp": os.environ.get("CI_TIMESTAMP", "")
                          }
                      }]
                  }).encode()
                  vec_req = urllib.request.Request(vec_url, data=vec_payload, headers={
                      "Authorization": f"Bearer {CF_API_TOKEN}",
                      "Content-Type": "application/json"
                  })
                  urllib.request.urlopen(vec_req, timeout=10)
                  indexed += 1
                  print(f"✅ Indexed: {change['file']}")
              except Exception as e:
                  failed += 1
                  print(f"❌ Failed {change['file']}: {e}")

          print(f"\n📊 Results: {indexed} indexed, {failed} failed out of {len(changes)} files")
          PYEOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CI_TIMESTAMP: ${{ github.event.pull_request.updated_at }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VECTORIZE_INDEX: ${{ vars.VECTORIZE_INDEX || 'ci-code-vectors' }}

  update-index:
    name: Update Knowledge Base
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 5
          persist-credentials: false

      - name: Index merged changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          FILES_CHANGED=$(git diff HEAD~1 --name-only | head -50)
          FILE_COUNT=$(echo "$FILES_CHANGED" | wc -l)

          echo "### 🔍 CI Intelligence: Main Branch Update" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          echo "**Files**: $FILE_COUNT" >> $GITHUB_STEP_SUMMARY

          python3 << EOF
          import json, os

          files = """$FILES_CHANGED""".strip().split("\n")
          data = [{
              "file": f,
              "extension": f.rsplit(".", 1)[-1] if "." in f else "",
              "commit": "$COMMIT_MSG",
              "branch": "main"
          } for f in files if f.strip()]

          with open("/tmp/main-index.json", "w") as fh:
              json.dump(data, fh)

          print(f"Indexed {len(data)} files from main branch")
          EOF

      - name: Update KV metadata
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "{\"last_commit\": \"$COMMIT_SHA\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > /tmp/kv-meta.json
          cat /tmp/kv-meta.json
