name: Hermes Weekly Loop

on:
  schedule:
    # Run every Sunday at 10 AM UTC
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print report without posting'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  weekly-synthesis:
    name: Hermes Weekly Synthesis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Collect data
        id: data
        run: |
          # ── Git log since last Sunday ──
          SINCE=$(date -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -v-7d +%Y-%m-%d)
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"

          COMMITS=$(git log --since="$SINCE" --oneline --no-merges --format="%h %s" 2>/dev/null | head -50)
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo 0)
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"

          # ── Open PRs ──
          OPEN_PRS=$(gh pr list --state open --json number,title,author,createdAt,reviewDecision,statusCheckRollup --jq '.[] | "#\(.number) \(.title) [\(.author.login)] checks:\(.statusCheckRollup | map(.conclusion // "pending") | join(","))"' 2>/dev/null || echo "Failed to fetch PRs")
          echo "open_prs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OPEN_PRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          PR_COUNT=$(echo "$OPEN_PRS" | grep -c . || echo 0)
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          # ── Merged PRs this week ──
          MERGED_PRS=$(gh pr list --state merged --search "merged:>=$SINCE" --json number,title,mergedAt --jq '.[] | "#\(.number) \(.title)"' 2>/dev/null || echo "Failed")
          echo "merged_prs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MERGED_PRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          MERGED_COUNT=$(echo "$MERGED_PRS" | grep -c . || echo 0)
          echo "merged_count=$MERGED_COUNT" >> "$GITHUB_OUTPUT"

          # ── Open issues ──
          ISSUES=$(gh issue list --state open --json number,title,labels --jq '.[] | "#\(.number) \(.title) [\(.labels | map(.name) | join(","))]"' 2>/dev/null || echo "Failed")
          echo "issues<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          ISSUE_COUNT=$(echo "$ISSUES" | grep -c . || echo 0)
          echo "issue_count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"

          # ── Branch health ──
          STALE_BRANCHES=$(git branch -r --no-merged main 2>/dev/null | grep -v "HEAD" | wc -l | tr -d ' ')
          echo "stale_branches=$STALE_BRANCHES" >> "$GITHUB_OUTPUT"

          # ── Test status from latest CI ──
          LATEST_CI=$(gh run list --workflow=ci.yml --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
          echo "latest_ci=$LATEST_CI" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Hermes report
        run: |
          cat > /tmp/hermes-report.md << 'REPORT_EOF'
          # Hermes Weekly Report — ${{ steps.data.outputs.since }}

          ## What Shipped
          ${{ steps.data.outputs.merged_prs || '_No PRs merged this week_' }}

          **Commits this week:** ${{ steps.data.outputs.commit_count }}

          ## What's Stale (Open PRs)
          ${{ steps.data.outputs.open_prs || '_No open PRs_' }}

          ## What's Blocked
          REPORT_EOF

          # Detect blocked PRs (failing CI)
          echo "${{ steps.data.outputs.open_prs }}" | while IFS= read -r line; do
            if echo "$line" | grep -q "failure\|error"; then
              echo "- ⚠️ $line" >> /tmp/hermes-report.md
            fi
          done

          cat >> /tmp/hermes-report.md << 'REPORT_EOF2'

          ## Open Issues
          ${{ steps.data.outputs.issues || '_No open issues_' }}

          ## Repo Health
          | Metric | Value |
          |--------|-------|
          | Latest CI | ${{ steps.data.outputs.latest_ci }} |
          | Stale branches (unmerged) | ${{ steps.data.outputs.stale_branches }} |
          | Open PRs | ${{ steps.data.outputs.pr_count }} |
          | Merged this week | ${{ steps.data.outputs.merged_count }} |
          | Open issues | ${{ steps.data.outputs.issue_count }} |

          ## What's Next
          _To be filled by Mohamed during planning session._

          ---
          _Generated by Hermes Weekly Loop — AxiomID CI Intelligence_
          REPORT_EOF2

          echo "=== HERMES REPORT ==="
          cat /tmp/hermes-report.md

      - name: Post to GitHub Step Summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: cat /tmp/hermes-report.md >> $GITHUB_STEP_SUMMARY
