name: AI PR Health

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-health:
    name: PR Hygiene Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "diff=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$DIFF" > /tmp/pr.diff
          FILE_COUNT=$(grep -c "^diff --git" /tmp/pr.diff || true)
          : "${FILE_COUNT:=0}"
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          ADDITIONS=$(grep -c '^+[^+]' /tmp/pr.diff || true)
          : "${ADDITIONS:=0}"
          echo "additions=$ADDITIONS" >> "$GITHUB_OUTPUT"
          DELETIONS=$(grep -c '^-[^-]' /tmp/pr.diff || true)
          : "${DELETIONS:=0}"
          echo "deletions=$DELETIONS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # â”€â”€ Hygiene Rule: Cross-boundary security touches â”€â”€
      - name: Detect cross-boundary security touches
        if: steps.diff.outputs.file_count != '0'
        run: |
          ALERTS=""

          # Security-sensitive paths
          SECURITY_PATHS="auth middleware crypto secret token key password soul"

          # Extract changed files
          CHANGED_FILES=$(grep "^diff --git a/" /tmp/pr.diff | sed 's|diff --git a/||; s| b/.*||')

          # Classify files into security vs non-security
          SECURITY_FILES=""
          OTHER_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            IS_SEC=false
            for path in $SECURITY_PATHS; do
              if echo "$file" | grep -qi "$path"; then
                IS_SEC=true
                break
              fi
            done
            if [ "$IS_SEC" = true ]; then
              SECURITY_FILES="$SECURITY_FILES$file\n"
            else
              OTHER_FILES="$OTHER_FILES$file\n"
            fi
          done <<< "$CHANGED_FILES"

          SEC_COUNT=$(echo -e "$SECURITY_FILES" | grep -c . || echo 0)
          OTHER_COUNT=$(echo -e "$OTHER_FILES" | grep -c . || echo 0)

          # Flag: security files changed alongside unrelated files
          if [ "$SEC_COUNT" -gt 0 ] && [ "$OTHER_COUNT" -gt 3 ]; then
            ALERTS="${ALERTS}cross_boundary=true\n"
            ALERTS="${ALERTS}sec_files<<SECEOF\n$(echo -e "$SECURITY_FILES" | head -10)\nSECEOF\n"
          fi

          # Flag: large PR (>500 lines changed)
          TOTAL=$(( ${{ steps.diff.outputs.additions }} + ${{ steps.diff.outputs.deletions }} ))
          if [ "$TOTAL" -gt 500 ]; then
            ALERTS="${ALERTS}large_pr=true\n"
          fi

          # Flag: PR touches auth routes without test changes
          AUTH_TOUCHED=$(echo "$CHANGED_FILES" | grep -c "^src/app/api/auth" || echo 0)
          TEST_TOUCHED=$(echo "$CHANGED_FILES" | grep -c "^src/__tests__" || echo 0)
          if [ "$AUTH_TOUCHED" -gt 0 ] && [ "$TEST_TOUCHED" -eq 0 ]; then
            ALERTS="${ALERTS}auth_no_test=true\n"
          fi

          if [ -n "$ALERTS" ]; then
            echo -e "$ALERTS" > /tmp/hygiene-alerts.txt
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply labels
        if: steps.diff.outputs.file_count != '0'
        run: |
          LABELS=""
          TOTAL=$(( ${{ steps.diff.outputs.additions }} + ${{ steps.diff.outputs.deletions }} ))

          # Size label
          if [ "$TOTAL" -le 10 ]; then
            LABELS="size:XS"
          elif [ "$TOTAL" -le 50 ]; then
            LABELS="size:S"
          elif [ "$TOTAL" -le 200 ]; then
            LABELS="size:M"
          elif [ "$TOTAL" -le 1000 ]; then
            LABELS="size:L"
          else
            LABELS="size:XL"
          fi

          if [ -f /tmp/hygiene-alerts.txt ]; then
            if grep -q "cross_boundary=true" /tmp/hygiene-alerts.txt; then
              LABELS="$LABELS needs-human-approval priority:high"
            fi
            if grep -q "auth_no_test=true" /tmp/hygiene-alerts.txt; then
              LABELS="$LABELS needs-human-approval"
            fi
          fi

          if [ -n "$LABELS" ]; then
            if gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "$LABELS" 2>/dev/null; then
              echo "âś… Applied labels: $LABELS"
            else
              echo "âš ď¸Ź  Could not apply some labels: $LABELS (may not exist in repo)"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
