name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: type-check + lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate || echo "⚠️ Prisma generate skipped (no DATABASE_URL or schema)"

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://localhost:5432/dummy"

      - name: Test
        run: npm test -- --ci --runInBand

      - name: Dead code check
        run: npx knip --no-progress
        continue-on-error: true

  autonoma-preview:
    name: Autonoma Preview + E2E
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Autonoma
        env:
          AUTONOMA_CLIENT_ID: ${{ secrets.AUTONOMA_CLIENT_ID }}
          AUTONOMA_SECRET_ID: ${{ secrets.AUTONOMA_SECRET_ID }}
        run: |
          npx -y mcp-remote https://api.autonoma.app/v1/mcp/onboarding --pairing-code ${{ secrets.AUTONOMA_PAIRING_CODE }}

      - name: Run E2E against preview
        run: |
          npx playwright test --project=chromium
