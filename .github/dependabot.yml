version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "Moeabdelaziz007"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      production:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@prisma/*"
          - "zod"
        update-types:
          - "minor"
          - "patch"
      dev:
        patterns:
          - "@types/*"
          - "jest"
          - "ts-jest"
          - "typescript"
          - "eslint*"
          - "prettier"
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/crypto"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps-crypto)"

  - package-ecosystem: "npm"
    directory: "/packages/sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps-sdk)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
