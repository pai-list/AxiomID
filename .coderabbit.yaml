# CodeRabbit configuration for AxiomID
# Free tier: 200 files/hour, 4 PR reviews/hour
# Docs: https://docs.coderabbit.ai

reviews:
  profile: chill
  path_filters:
    - "!**/*.md"
    - "!**/*.json"
    - "!**/*.lock"
    - "!**/public/**"
    - "!**/*.css"
  paths:
    - "src/app/api/**"
      instructions: |
        All API routes must use requireAuth() for authentication.
        Use apiError() with pre-registered ErrorCode strings only.
        Never pass ad-hoc strings to apiError().
    - "src/lib/**"
      instructions: |
        TypeScript strict mode. No `as any` casts.
        Use `unknown` for external data boundaries.
    - "src/middleware.ts"
      instructions: |
        CORS allowlist must include .pinet.com wildcard for Pi Browser.
        Never remove the production sandbox bypass guard.

chat:
  auto_reply: true

keywords:
  - "Pi Browser"
  - "Pi SDK"
  - "CORS"
  - "auth"
  - "middleware"
  - "AxiomID"
