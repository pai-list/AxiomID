name = "agent-email-router"
main = "src/workers/agent-email-router.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "PAI_RECEIPTS"
id = "REPLACE_WITH_KV_ID"

# FIX (P0 #3): Cross-worker DO binding.
# AgentStateDO is NOT defined in this worker — it lives in the main backend worker.
# Use script_name to bind to the main worker's DO, not a local class definition.
# The main worker name must match the `name` field in backend/wrangler.toml.
[[durable_objects.bindings]]
name = "AGENT_STATE"
class_name = "AgentStateDO"
script_name = "axiomid-backend"

# DO NOT declare migrations for a class that doesn't exist in this worker.
# The migration was removed — AgentStateDO is owned by axiomid-backend.

# Email routing: catch-all *@agents.axiomid.app → this Worker
# Configured in Cloudflare Dashboard → Email → Email Routing
