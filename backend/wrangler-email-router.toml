name = "agent-email-router"
main = "src/workers/agent-email-router.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "PAI_RECEIPTS"
id = "REPLACE_WITH_KV_ID"

[[durable_objects.bindings]]
name = "AGENT_STATE"
class_name = "AgentStateDO"

[[migrations]]
tag = "v1"
new_classes = ["AgentStateDO"]

# Email routing: catch-all *@agents.axiomid.app → this Worker
# Configured in Cloudflare Dashboard → Email → Email Routing
