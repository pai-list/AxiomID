<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- Deep premium background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="70%" stop-color="#020203"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    
    <!-- Cyberpunk glowing neon gradients -->
    <linearGradient id="neon-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="crest-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    
    <linearGradient id="inner-alpha" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#88888b"/>
    </linearGradient>
    
    <!-- Soft glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  
  <!-- Outer Attestation Ring (L0 Authority Outer Boundary) -->
  <rect x="8" y="8" width="176" height="176" rx="34" fill="none" stroke="url(#neon-ring)" stroke-width="1" opacity="0.12"/>
  
  <!-- Subtle radial scanning backing -->
  <circle cx="96" cy="96" r="78" fill="url(#crest-glow)" />
  
  <!-- Interactive Glowing Orbit -->
  <circle cx="96" cy="96" r="68" fill="none" stroke="url(#neon-ring)" stroke-width="1.5" stroke-dasharray="6 20 30 8" opacity="0.85" filter="url(#glow)"/>

  <!-- Axiom Sovereign Identity Crest (The Geometric A) -->
  <g transform="translate(0, 2)">
    <!-- Behind shadow/glow -->
    <path d="M96 45 L138 130 L120 130 L96 82 L72 130 L54 130 Z" fill="#00d4ff" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Main Left Strut -->
    <path d="M96 45 L54 130 L72 130 L96 82 Z" fill="url(#inner-alpha)" />
    
    <!-- Main Right Strut -->
    <path d="M96 45 L96 82 L120 130 L138 130 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Quantum Intersect (The horizontal bar of A represented as sovereign key-bridge) -->
    <path d="M78 112 H114 L110 120 H82 Z" fill="url(#neon-ring)" filter="url(#glow)"/>
  </g>

  <!-- Attestation Node (Top Spark) -->
  <circle cx="96" cy="36" r="3" fill="#39FF14" filter="url(#glow)"/>
  <circle cx="96" cy="36" r="1" fill="#ffffff"/>
  
  <!-- Attestation Node (Bottom Anchor) -->
  <circle cx="96" cy="156" r="3" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="96" cy="156" r="1" fill="#ffffff"/>
</svg>
