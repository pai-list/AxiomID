<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Deep premium background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="70%" stop-color="#020203"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    
    <!-- Cyberpunk glowing neon gradients -->
    <linearGradient id="neon-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="crest-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    
    <linearGradient id="inner-alpha" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#88888b"/>
    </linearGradient>
    
    <!-- Soft glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Outer Attestation Ring (L0 Authority Outer Boundary) -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#neon-ring)" stroke-width="1.5" opacity="0.12"/>
  
  <!-- Subtle radial scanning backing -->
  <circle cx="256" cy="256" r="210" fill="url(#crest-glow)" />
  
  <!-- Interactive Glowing Orbit -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neon-ring)" stroke-width="3" stroke-dasharray="10 34 50 12" opacity="0.85" filter="url(#glow)"/>

  <!-- Secondary Dot Matrix Overlay for engineering vibe -->
  <g opacity="0.15">
    <circle cx="256" cy="116" r="2" fill="#fff"/>
    <circle cx="256" cy="396" r="2" fill="#fff"/>
    <circle cx="116" cy="256" r="2" fill="#fff"/>
    <circle cx="396" cy="256" r="2" fill="#fff"/>
    <line x1="256" y1="96" x2="256" y2="416" stroke="#fff" stroke-width="0.5" stroke-dasharray="4 8"/>
    <line x1="96" y1="256" x2="416" y2="256" stroke="#fff" stroke-width="0.5" stroke-dasharray="4 8"/>
  </g>

  <!-- Axiom Sovereign Identity Crest (The Geometric A) -->
  <g transform="translate(0, 5)">
    <!-- Behind shadow/glow -->
    <path d="M256 120 L370 348 L320 348 L256 220 L192 348 L142 348 Z" fill="#00d4ff" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Main Left Strut -->
    <path d="M256 120 L142 348 L192 348 L256 220 Z" fill="url(#inner-alpha)" />
    
    <!-- Main Right Strut -->
    <path d="M256 120 L256 220 L320 348 L370 348 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Quantum Intersect (The horizontal bar of A represented as sovereign key-bridge) -->
    <path d="M208 300 H304 L294 320 H218 Z" fill="url(#neon-ring)" filter="url(#glow)"/>
    
    <!-- Embedded L0 Anchor Symbol -->
    <polygon points="256,220 236,260 276,260" fill="url(#neon-ring)" />
  </g>

  <!-- Attestation Node (Top Spark) -->
  <circle cx="256" cy="96" r="6" fill="#39FF14" filter="url(#glow)"/>
  <circle cx="256" cy="96" r="2" fill="#ffffff"/>
  
  <!-- Attestation Node (Bottom Anchor) -->
  <circle cx="256" cy="416" r="6" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="256" cy="416" r="2" fill="#ffffff"/>
</svg>
